<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" width="880" height="200"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif"
     role="img" aria-label="CachePin — keep your coding agent's KV Cache alive across turns">
  <defs>
    <linearGradient id="hg-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="880" height="200" rx="20" fill="#F5F5F7"/>
  <rect x="0" y="0" width="880" height="6" rx="3" fill="url(#hg-l)"/>

  <!-- pinned-prefix motif: a stable prefix of blocks plus a pin -->
  <g transform="translate(40,78)">
    <rect x="0"  y="0" width="40" height="44" rx="7" fill="#6d28d9" fill-opacity="0.9"/>
    <rect x="50" y="0" width="40" height="44" rx="7" fill="#6d28d9" fill-opacity="0.7"/>
    <rect x="100" y="0" width="40" height="44" rx="7" fill="#6d28d9" fill-opacity="0.5"/>
    <rect x="150" y="0" width="40" height="44" rx="7" fill="#14b8a6" fill-opacity="0.85"/>
    <!-- pin head over the preserved prefix -->
    <circle cx="20" cy="-6" r="9" fill="#14b8a6"/>
    <line x1="20" y1="-6" x2="20" y2="14" stroke="#14b8a6" stroke-width="3" stroke-linecap="round"/>
  </g>

  <text x="270" y="92" font-size="54" font-weight="800" fill="#1d1d1f">CachePin</text>
  <text x="272" y="130" font-size="19" font-weight="500" fill="#4B3FC4">Keep your coding agent's KV Cache alive across turns</text>
  <text x="272" y="156" font-size="14" fill="#6e6e73">Harness-neutral OpenAI-compatible proxy · Go · stdlib only</text>
</svg>
