<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" width="880" height="200"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif"
     role="img" aria-label="CachePin — keep your coding agent's KV Cache alive across turns">
  <defs>
    <linearGradient id="hg-d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="880" height="200" rx="20" fill="#0d0d12"/>
  <rect x="0" y="0" width="880" height="6" rx="3" fill="url(#hg-d)"/>

  <!-- pinned-prefix motif: a stable prefix of blocks plus a pin -->
  <g transform="translate(40,78)">
    <rect x="0"  y="0" width="40" height="44" rx="7" fill="#a78bfa" fill-opacity="0.95"/>
    <rect x="50" y="0" width="40" height="44" rx="7" fill="#a78bfa" fill-opacity="0.7"/>
    <rect x="100" y="0" width="40" height="44" rx="7" fill="#a78bfa" fill-opacity="0.5"/>
    <rect x="150" y="0" width="40" height="44" rx="7" fill="#2dd4bf" fill-opacity="0.9"/>
    <circle cx="20" cy="-6" r="9" fill="#2dd4bf"/>
    <line x1="20" y1="-6" x2="20" y2="14" stroke="#2dd4bf" stroke-width="3" stroke-linecap="round"/>
  </g>

  <text x="270" y="92" font-size="54" font-weight="800" fill="#f5f5f7">CachePin</text>
  <text x="272" y="130" font-size="19" font-weight="500" fill="#c4b5fd">Keep your coding agent's KV Cache alive across turns</text>
  <text x="272" y="156" font-size="14" fill="#9a9aa3">Harness-neutral OpenAI-compatible proxy · Go · stdlib only</text>
</svg>
